<div class="vocabulary-container">
    <div class="header-container">
        <h2 class="header-topic">Vocabulary</h2>
        <input class="header-input" type="text" placeholder="Сөзді теріңіз...">
        <button class="header-button">+ Add Word</button>
    </div>
    <div class="second-container">
        <button class="button-filter">All Words</button>
        <button class="button-filter">New</button>
        <button class="button-filter">Reviewing</button>
        <button class="button-filter">Learned</button>
    </div>
    <div class="third-last-container">
        <div class="third-container">
            <h2 class="stat-title">Statistics</h2>
            <div class="stat-cards">

                <div class="stat-card">
                    <p class="stat-label">TOTAL WORDS</p>
                    <h4 class="stat-number total-number">246</h4>
                </div>

                <div class="stat-card">
                    <p class="stat-label">LEARNED</p>
                    <h4 class="stat-number learned-number">34</h4>
                </div>

                <div class="stat-card">
                    <p class="stat-label">NOT LEARNED</p>
                    <h4 class="stat-number not-learned-number">333</h4>
                </div>
            </div>
        </div >
        <div class="last-container">
            <h3>Your Progress</h3>
            <div>
                <div class="progress-row">
                    <span class="progress-label">A1 Beginner</span>
                    <span class="progress-number">100%</span>
                </div>
            <div class="progress-bar-outer">
                <div class="progress-bar-inner" style="width: 100%"></div>
            </div>

            <div class="progress-row">
                <span class="progress-label">A2 Elementary</span>
                <span class="progress-number">70%</span>
            </div>
            <div class="progress-bar-outer">
                <div class="progress-bar-inner" style="width: 70%"></div>
            </div>

            <div class="progress-row">
                <span class="progress-label">B1 Intermediate</span>
                <span class="progress-number">20%</span>
            </div>
            <div class="progress-bar-outer">
                <div class="progress-bar-inner" style="width: 20%"></div>
            </div>
            </div>
        </div>
    </div>
</div>
