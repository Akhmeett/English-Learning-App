<div class="level-container">

    <div class="level-header">
        <h1 class="level-title">Quiz</h1>
        <p class="level-subtitle">Деңгей таңдаңыз</p>
    </div>

    <div class="level-buttons">

        <button class="level-btn" (click)="selectLevel('A1')">
            <div class="level-info">
                <span class="level-name">A1</span>
                <span class="level-desc">Beginner</span>
            </div>
            <span class="level-arrow">→</span>
        </button>

        <button class="level-btn" (click)="selectLevel('A2')">
            <div class="level-info">
                <span class="level-name">A2</span>
                <span class="level-desc">Elementary</span>
            </div>
            <span class="level-arrow">→</span>
        </button>

        <button class="level-btn" (click)="selectLevel('B1')">
            <div class="level-info">
                <span class="level-name">B1</span>
                <span class="level-desc">Intermediate</span>
            </div>
            <span class="level-arrow">→</span>
        </button>

    </div>

</div>
